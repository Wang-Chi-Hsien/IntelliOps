name: build-and-test

# 消除 Node.js 20 警告的環境變數
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 下載最新的程式碼
      uses: actions/checkout@v4

    - name: 設定 .NET 10 環境
      uses: actions/setup-dotnet@v4
      with:
        # 注意這裡！因為您的 csproj 寫著 net10.0，所以必須裝 10.0.x
        dotnet-version: '10.0.x' 

    - name: 還原 NuGet 套件 (嚴格指定只看 AgentWorker)
      # 強制指定 csproj 的絕對路徑，絕對不允許機器人去碰 .sln 檔！
      run: dotnet restore ./IntelliOps.AgentWorker/IntelliOps.AgentWorker.csproj

    - name: 編譯專案 (嚴格指定只看 AgentWorker)
      run: dotnet build ./IntelliOps.AgentWorker/IntelliOps.AgentWorker.csproj --configuration Release --no-restore